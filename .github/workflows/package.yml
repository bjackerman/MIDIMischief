name: Package desktop artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: MIDIMischief-*-windows-x64-setup.exe
          - name: macos-universal
            os: macos-latest
            artifact: MIDIMischief-*-macos.dmg
          - name: linux-x86_64
            os: ubuntu-22.04
            artifact: MIDIMischief-*-linux-x86_64.AppImage
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.1.0-dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install ".[all,package]"
      - name: Build frozen application
        run: python -m PyInstaller --noconfirm --clean --distpath dist midimap.spec
      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress
      - name: Create Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        # The choco install step puts makensis under
        # C:\Program Files (x86)\NSIS but does not refresh the
        # PATH for subsequent steps in the same job. Use the
        # full path so PowerShell can find the executable.
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=$env:VERSION /DDIST_DIR=dist packaging/windows/MIDIMischief.nsi'
      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: bash packaging/macos/create_dmg.sh
      - name: Sign and notarize macOS DMG
        if: runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && env.APPLE_SIGNING_IDENTITY != ''
        run: bash packaging/macos/sign_and_notarize.sh
      - name: Install AppImage tooling
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - name: Create AppImage
        if: runner.os == 'Linux'
        run: |
          curl -L --retry 3 -o /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage
          PATH="/tmp:$PATH" ln -sf /tmp/appimagetool.AppImage /tmp/appimagetool
          PATH="/tmp:$PATH" bash packaging/linux/build_appimage.sh
      - name: Archive installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
